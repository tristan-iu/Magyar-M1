# config.example.yaml — TEMPLATE de configuration du projet Magyar
# Copier en config.yaml et adapter les chemins à votre machine :
#   cp config.example.yaml config.yaml
#
# config.yaml est dans .gitignore (chemins machine-dépendants).
# Ce fichier (config.example.yaml) est commité et documente la structure.

# ---------------------------------------------------------------------------
# CHEMINS — à adapter selon votre installation
# ---------------------------------------------------------------------------
paths:
  corpus_base:      "/path/to/M1_corpus/processed"
  fiches_dir:       "/path/to/M1_corpus/processed/fiches"
  keyframes_dir:    "/path/to/M1_corpus/processed/fiches/keyframes"
  logs_dir:         "/path/to/M1_corpus/logs"

  # JSONL enrichis (dans corpus_base/)
  # Les jsonl_* historiques sont conservés pour rejouer le pipeline étape par
  # étape ; en pratique seul jsonl_clean est lu par les analyses R.
  jsonl_ffprobe:         "messages_ffprobe.jsonl"
  jsonl_whisper:         "messages_whisper.jsonl"
  jsonl_computervision:  "messages_computervision.jsonl"
  jsonl_faces:           "messages_faces.jsonl"
  jsonl_enriched:        "messages_enriched.jsonl"  # intermédiaire (pré-blasons)
  jsonl_clean:           "messages_clean.jsonl"     # canonique post-migration v2

  # JSONL local allégé (repo)
  jsonl_stripped: "3b_stats_R/messages_stripped.jsonl"

  # JSONL brut (scraper — hors corpus_base)
  raw_path: "/path/to/M1_corpus/raw/messages.jsonl"

  # Repo local
  repo_base: "/path/to/M1_Magyar_repo"

# ---------------------------------------------------------------------------
# PHASES
# ---------------------------------------------------------------------------
phases:
  P1:
    label: "Artisanal"
    # 2022-09-01 : 7 messages (id 1-7) postés la veille du démarrage officiel.
    start: "2022-09-01"
    end:   "2023-12-31"
    color: "#ece7f2"
  P2:
    label: "Semi-pro"
    start: "2024-01-01"
    end:   "2024-09-30"
    color: "#a6bddb"
  P3:
    label: "Institutionnel"
    start: "2024-10-01"
    end:   "2025-09-30"
    color: "#2b8cbe"

# ---------------------------------------------------------------------------
# MODÈLES 
# ---------------------------------------------------------------------------
models:
  whisper:
    model_name: "large-v3" # à adapter en fonction des besoins
    language: "uk"
    # Prompt de décodage pour jargon militaire ukrainien (v1 — openai-whisper)
    prompt: "Мадяр, дрони, FPV, скид, аеророзвідка, військовий жаргон, війна, 414 бригада"
    device: "auto"          # "auto" = GPU si dispo, sinon CPU
    compute_type: "float16" # float16 sur GPU, int8 sur CPU

  vad:
    # Silero VAD — pré-filtre Whisper, chargé via torch.hub (pas de paquet pip)
    threshold:      0.35
    min_speech_ms:  200
    min_silence_ms: 200
    sampling_rate:  16000

  spacy:
    model_name: "uk_core_news_trf"
    # Classes exclues de la lemmatisation — catégories sans charge sémantique
    # thématique : ponctuation, chiffres, mots grammaticaux (pronoms, conjonctions,
    # prépositions, déterminants, particules, interjections).
    # PRON/DET/ADP/CCONJ/SCONJ/PART sont ajoutés car spaCy uk_core_news_trf
    # les laisse passer malgré les stop_words par défaut.
    excluded_pos: ["PUNCT", "SPACE", "SYM", "NUM", "X",
                   "PRON", "DET", "ADP", "CCONJ", "SCONJ", "PART", "INTJ"]
    min_lemma_length: 2

  easyocr:
    languages: ["ru", "uk", "en"]
    gpu: true               # fallback CPU automatique si CUDA absent

  scenedetect:
    # Détecteur principal : PySceneDetect ContentDetector (HSV delta).
    # Surchargeable en CLI via --threshold / --min-scene-len.
    content_threshold:   27.0   # seuil ContentDetector (0-100, plus bas = plus sensible)
    min_scene_len:       15     # frames mini par scène (~0.5s à 30fps)
    # Fallback HistogramDetector : si ContentDetector sur-découpe une vidéo
    # courte (typique des clips à montage rapide / glitchs de compression),
    # on rejoue avec HistogramDetector — plus robuste aux changements de
    # luminosité brefs mais moins sensible aux coupes franches.
    fallback_max_cuts:        50    # > N coupes...
    fallback_max_duration_s:  30    # ...sur vidéo < N secondes → fallback
    histogram_threshold:      0.05  # seuil HistogramDetector (delta YUV)

  insightface:
    model_pack: "buffalo_l"
    # Seuil cosine distance pour identifier Magyar (< threshold = match)
    identity_threshold: 0.6
    # Fréquence d'échantillonnage pour la détection (1 frame / N secondes)
    sample_every_s: 10

  clip:
    # Note méthodologique : CLIP zero-shot a été testé sur 962 messages mais
    # les classifications se sont révélées peu discriminantes par phase.
    # Conservé en CSV uniquement (pas écrit dans le JSONL canonique). Voir
    # 2d_vision/clip/README.md pour le détail de cette limite méthodologique.
    model_name: "openai/clip-vit-large-patch14"
    # Labels zero-shot pour classification de scène
    scene_labels:
      - "outdoor field"
      - "trench"
      - "armored vehicle"
      - "drone POV"
      - "indoor bunker"
      - "person talking to camera"
      - "FPV impact"
      - "aerial footage"
    # Labels thermique vs optique
    thermal_labels:
      - "thermal imaging camera"
      - "optical camera"
      - "FPV camera"
      - "night vision"

